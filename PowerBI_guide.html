<header>
  <h1>Power BI Practical Interview Guide</h1>
  <p>A structured reference for analysts with theoretical knowledge — bridging concepts to real-world practice, with interview tips and examples for every topic.</p>
  <div class="header-badge">13 Topics &nbsp;&middot;&nbsp; Interview Ready &nbsp;&middot;&nbsp; Beginner to Advanced for Hari, Roy</div>

<script>
const sections = [
{
  title: "Power BI Components", icon: "Puzzle",
  intro: "Power BI is a suite of tools, not a single application. Understanding what each component does and when to use it is a foundational interview topic.",
  cards: [
    { accent: "blue",   tag: "core", tagLabel: "Core",      title: "Power BI Desktop",
      body: `<div class="definition">A free Windows application where you connect to data, shape it, build the data model, write DAX measures, and design report visuals.</div><div class="how-it-works"><div class="label">What you do here</div><ul><li><strong>Get Data</strong> — connect to databases, Excel, APIs, cloud services</li><li><strong>Power Query</strong> — clean and transform data before loading</li><li><strong>Model View</strong> — define table relationships, hierarchies, and roles</li><li><strong>Report View</strong> — drag-and-drop visuals, add slicers, write DAX</li></ul></div><div class="analogy">Think of Desktop as Microsoft Word for reports — it's where you author everything before publishing it to the web.</div><div class="interview-tip">When asked "where do you build reports?", always clarify Desktop vs. Service. Desktop = authoring; Service = sharing.</div>` },
    { accent: "teal",   tag: "core", tagLabel: "Core",      title: "Power BI Service",
      body: `<div class="definition">The cloud-based platform (app.powerbi.com) where published reports are hosted, shared, refreshed, and embedded.</div><div class="how-it-works"><div class="label">Key capabilities</div><ul><li><strong>Workspaces</strong> — shared folders for team collaboration</li><li><strong>Apps</strong> — bundled collections of reports distributed to end-users</li><li><strong>Scheduled Refresh</strong> — auto-refreshes datasets on a set schedule</li><li><strong>Row-Level Security</strong> — enforced when users view published reports</li><li><strong>Sharing and Permissions</strong> — manage who can view or edit</li></ul></div><div class="interview-tip">Interviewers often ask: "How do you share a report?" Answer: Publish from Desktop, then share via App or Workspace link in Service.</div><div class="practice-box">Navigate to app.powerbi.com, find your workspace, and identify the published dataset vs. the report file.</div>` },
    { accent: "orange", tag: "",     tagLabel: "",           title: "On-Premises Data Gateway",
      body: `<div class="definition">A software agent installed on a local Windows server that acts as a secure bridge between on-premises data sources and the Power BI Service in the cloud.</div><div class="how-it-works"><div class="label">Two gateway types</div><ul><li><strong>Standard (Enterprise)</strong> — multi-user, managed centrally by IT admins, used in all production environments; supports clustering for high availability</li><li><strong>Personal</strong> — single-user, runs on your own machine, for development and testing only; cannot be shared with other users</li></ul><div class="label" style="margin-top:10px">When you need it</div><ul><li>Any on-premises database (SQL Server, Oracle, Teradata) that Power BI Service cannot reach directly through the internet</li><li>Required for scheduled dataset refresh when data lives inside the corporate network</li><li>Also required by Power BI Dataflows that pull from on-premises sources</li></ul></div><div class="analogy">The gateway is like a mail clerk inside a secure building — cloud requests go to the clerk, who fetches data from inside and sends it back safely.</div><div class="interview-tip">For full installation steps, JDBC/ODBC driver configuration, org-level data source registration, and troubleshooting, see the dedicated <strong>On-Premises Gateway</strong> tab.</div>` },
    { accent: "purple", tag: "",     tagLabel: "",           title: "Power BI Mobile and Embedded",
      body: `<div class="definition"><strong>Mobile</strong>: An iOS/Android app for viewing reports on the go. <strong>Embedded</strong>: An API that lets developers embed Power BI visuals inside custom web applications.</div><div class="how-it-works"><div class="label">When each matters</div><ul><li><strong>Mobile</strong> — executives viewing KPI dashboards while traveling</li><li><strong>Embedded (Premium)</strong> — ISVs or internal portals that need BI inside a custom app without requiring a Power BI Pro license for each consumer</li></ul></div><div class="interview-tip">Mentioning Embedded shows awareness of the full ecosystem — especially valuable in enterprise or ISV roles.</div>` },
    { accent: "teal",   tag: "core", tagLabel: "Core",      title: "Semantic Model (formerly Dataset)",
      body: `<div class="definition">When you publish a .pbix from Power BI Desktop, the Power BI Service creates <strong>two separate items</strong> in your workspace: a <strong>Report</strong> (the pages and visuals you designed) and a <strong>Semantic Model</strong> (the data layer — tables, relationships, DAX measures, and the stored data). The semantic model is the second item you see listed alongside your report in the workspace.</div><div class="how-it-works"><div class="label">What the Semantic Model contains</div><ul><li>All tables loaded and shaped in Power Query (actual data in Import mode; connection metadata in DirectQuery)</li><li>Table relationships, hierarchies, and sort-by-column settings from Model View</li><li>All DAX measures and calculated columns you wrote</li><li>Row-Level Security and Object-Level Security configuration</li><li>Scheduled refresh settings, data source credentials, and gateway mappings</li><li>Sensitivity labels applied to the model</li></ul></div><div class="how-it-works"><div class="label">Why the separation matters</div><ul><li><strong>One model, many reports</strong> — multiple .pbix files (or reports built in the Service) can all connect to the same semantic model via Live Connection; they share the same data and measures without duplicating storage</li><li><strong>Build reports without Desktop</strong> — in the Service, any workspace member with Edit access can create a new report directly on an existing semantic model using the browser editor</li><li><strong>Refresh is model-scoped</strong> — the scheduled refresh is configured on the semantic model, not the report. Refreshing the model automatically updates all reports built on top of it</li><li><strong>Certification and governance</strong> — a semantic model can be Promoted or Certified, signalling to other teams that it is the official, trusted source for a subject area</li></ul></div><div class="how-it-works"><div class="label">How a Semantic Model is generated</div><ul><li><strong>Publishing from Desktop</strong> — the most common path: <em>File → Publish to Power BI → select workspace</em>. Power BI automatically splits the .pbix into a Report + Semantic Model in the Service</li><li><strong>Connecting to a Dataflow</strong> — build a model in Desktop sourced from a Power BI Dataflow, then publish; the semantic model's data comes from the dataflow's cloud-stored output tables</li><li><strong>Live Connection in Desktop</strong> — <em>Get Data → Power BI Semantic Models</em> → connect to an existing cloud model and publish only a new report layer; no second copy of data is stored</li><li><strong>Premium: large model format</strong> — in Premium workspaces, semantic models can exceed the standard 1 GB file limit using large model storage (backed by Azure Analysis Services)</li></ul></div><div class="interview-tip">When an interviewer asks "what is a dataset in Power BI?" — clarify that Microsoft renamed "Dataset" to "Semantic Model" in 2023. They are the same thing. The model is the intelligence layer (data + logic); the report is just the visual presentation on top of it. Always separate the two when explaining your solution architecture.</div>` },
  ]
},
{
  title: "Data Modeling", icon: "Model",
  intro: "A well-designed data model is the foundation of accurate, fast Power BI reports. Interviewers probe this heavily because bad models are the root cause of most BI problems.",
  cards: [
    { accent: "blue",   tag: "core", tagLabel: "Core",      title: "Star Schema",
      body: `<div class="definition">A modeling pattern where one central <strong>Fact Table</strong> (transactions, events, measures) is surrounded by multiple <strong>Dimension Tables</strong> (descriptive attributes like customers, dates, products).</div><div class="how-it-works"><div class="label">How to identify each table type</div><ul><li><strong>Fact Table</strong> — large, rows represent events (sales, orders, payments). Contains numeric values (amount, quantity) and foreign keys</li><li><strong>Dimension Table</strong> — small, rows represent entities (one per customer). Contains descriptive text and IDs</li></ul></div><div class="analogy">A star schema is like a restaurant receipt (fact) with separate menu, server, and location directories (dimensions). You look up the details from the directories.</div><div class="interview-tip">If shown a data model, immediately identify fact vs. dimension tables. Say "I prefer star schema over snowflake because it minimizes joins and improves DAX performance."</div>` },
    { accent: "teal",   tag: "core", tagLabel: "Core",      title: "Relationships: Cardinality and Direction",
      body: `<div class="definition">A relationship defines how two tables are linked. <strong>Cardinality</strong> describes the number ratio (One-to-Many). <strong>Cross-filter direction</strong> controls which way filters flow.</div><div class="how-it-works"><div class="label">Cardinality types</div><ul><li><strong>One-to-Many (1:M)</strong> — Best practice. One dimension row matches many fact rows</li><li><strong>One-to-One (1:1)</strong> — Usually means tables should be merged</li><li><strong>Many-to-Many (M:M)</strong> — Avoid when possible; use bridge tables instead</li></ul><div class="label" style="margin-top:10px">Cross-filter direction</div><ul><li><strong>Single</strong> — filters flow from the "one" side to the "many" side (default, recommended)</li><li><strong>Both</strong> — filters flow in both directions; use cautiously as it can cause ambiguity</li></ul></div><div class="interview-tip">When asked about a relationship issue, first ask: "Is the relationship 1:M? Is the filter direction correct?" These fix 80% of problems.</div>` },
    { accent: "orange", tag: "adv",  tagLabel: "Advanced",  title: "Active vs. Inactive Relationships",
      body: `<div class="definition">A table pair can have multiple relationships, but only <strong>one can be active</strong> at a time. Others are <strong>inactive</strong> and must be explicitly triggered with USERELATIONSHIP().</div><div class="how-it-works"><div class="label">Common scenario</div><ul><li>A Sales fact table has OrderDate and ShipDate, both linking to a Date dimension</li><li>The active relationship uses OrderDate; an inactive one uses ShipDate</li><li>To calculate "Sales by Ship Date", use: CALCULATE(..., USERELATIONSHIP(Sales[ShipDate], Date[Date]))</li></ul></div><div class="interview-tip">Showing awareness of inactive relationships demonstrates intermediate-to-advanced modeling knowledge. Prepare a real example from your report.</div>` },
    { accent: "green",  tag: "",     tagLabel: "",           title: "Calculated Columns vs. Measures",
      body: `<div class="definition">Both use DAX, but evaluate differently.<br><strong>Calculated Column</strong> — computed row-by-row at data refresh time, stored in the model.<br><strong>Measure</strong> — computed on the fly at query time based on the current filter context.</div><table class="compare-table"><tr><th>Feature</th><th>Calculated Column</th><th>Measure</th></tr><tr><td>Evaluated</td><td>At refresh (stored)</td><td>At query time (dynamic)</td></tr><tr><td>Row context</td><td>Yes — knows current row</td><td>No — needs iterators</td></tr><tr><td>Memory use</td><td>High (stored per row)</td><td>Low (not stored)</td></tr><tr><td>Best for</td><td>Segmentation, flags, labels</td><td>Aggregations, KPIs, ratios</td></tr></table><div class="interview-tip">Classic question: "When would you use a calculated column vs. a measure?" Use columns for row-level categorization (e.g., Age Group = "30-40"). Use measures for anything that aggregates or changes with filters.</div>` }
  ]
},
{
  title: "DAX", icon: "Formula",
  intro: "DAX (Data Analysis Expressions) is the formula language of Power BI. It is the most technically tested area in interviews. Understanding filter context is the key to mastering DAX.",
  cards: [
    { accent: "blue",   tag: "core", tagLabel: "Core",      title: "Filter Context vs. Row Context",
      body: `<div class="definition"><strong>Filter Context</strong> — the set of filters applied to a visual (slicers, rows, columns in a matrix). DAX measures always evaluate within this.<br><strong>Row Context</strong> — exists only inside calculated columns and iterator functions (SUMX, FILTER). It knows which row is being evaluated.</div><div class="how-it-works"><div class="label">Why it matters</div><ul><li>A measure like SUM(Sales[Amount]) automatically respects all active filters — that is filter context working</li><li>A calculated column like Sales[Margin] = Sales[Revenue] - Sales[Cost] uses row context to access values from the current row</li><li>Context transition: when you use a measure inside an iterator, row context is converted to filter context</li></ul></div><div class="interview-tip">This is the single most important DAX concept. Interviewers test it with: "Why does my measure show the same value in every row?" — usually a missing CALCULATE or wrong context.</div>` },
    { accent: "teal",   tag: "core", tagLabel: "Core",      title: "CALCULATE() — The Most Important Function",
      body: `<div class="definition">CALCULATE(expression, filter1, filter2, ...) evaluates an expression in a <strong>modified filter context</strong>. It can add, override, or remove filters.</div><div class="how-it-works"><div class="label">Example: Sales for a specific category regardless of slicer</div></div><div class="code-snippet"><span class="cm">-- Returns total Electronics sales, always</span>
Electronics Sales =
<span class="fn">CALCULATE</span>(
    <span class="fn">SUM</span>(Sales[Amount]),
    Products[Category] = <span class="st">"Electronics"</span>
)</div><div class="how-it-works"><div class="label">Key modifiers used with CALCULATE</div><ul><li>ALL(Table) — removes all filters on a table (used for % of total)</li><li>ALLSELECTED() — removes model filters but keeps slicer selections</li><li>KEEPFILTERS() — adds a filter without overriding existing ones</li></ul></div><div class="interview-tip">Practice writing a "% of Total" measure: DIVIDE(SUM(Sales[Amount]), CALCULATE(SUM(Sales[Amount]), ALL(Sales)))</div>` },
    { accent: "orange", tag: "key",  tagLabel: "Key Topic",  title: "Time Intelligence Functions",
      body: `<div class="definition">Built-in DAX functions that simplify date-based calculations. They require a proper Date dimension table with a continuous date range and an active relationship.</div><div class="how-it-works"><div class="label">Most commonly tested functions</div><ul><li>TOTALYTD() — Year-to-date total</li><li>TOTALQTD() — Quarter-to-date total</li><li>TOTALMTD() — Month-to-date total</li><li>SAMEPERIODLASTYEAR() — Same period, prior year</li><li>DATEADD(Dates, -1, YEAR) — Flexible date shifting</li></ul></div><div class="code-snippet">Sales YTD =
<span class="fn">TOTALYTD</span>(<span class="fn">SUM</span>(Sales[Amount]), 'Date'[Date])

Sales LY =
<span class="fn">CALCULATE</span>(
    <span class="fn">SUM</span>(Sales[Amount]),
    <span class="fn">SAMEPERIODLASTYEAR</span>('Date'[Date])
)</div><div class="interview-tip">Always mention: "Time intelligence only works when there is a continuous date table with no gaps, marked as a Date Table in Power BI."</div>` },
    { accent: "purple", tag: "adv",  tagLabel: "Advanced",  title: "Iterator Functions: SUMX, AVERAGEX, RANKX",
      body: `<div class="definition">Iterator functions loop over a table row-by-row, evaluate an expression per row using row context, and then aggregate the results.</div><div class="how-it-works"><div class="label">When to use SUMX vs. SUM</div><ul><li>SUM(Sales[Amount]) — sums a single column that already exists</li><li>SUMX(Sales, Sales[Qty] * Sales[UnitPrice]) — computes the multiplication per row first, then sums — required when the column does not exist</li></ul></div><div class="code-snippet">Revenue = <span class="fn">SUMX</span>(Sales, Sales[Qty] * Sales[UnitPrice])

Rank by Revenue =
<span class="fn">RANKX</span>(<span class="fn">ALL</span>(Products[Name]), [Revenue],,<span class="fn">DESC</span>)</div><div class="interview-tip">SUMX and RANKX appear in almost every senior DAX interview. Know when SUM is not enough and SUMX is needed.</div>` },
    { accent: "green",  tag: "",     tagLabel: "",           title: "Variables in DAX (VAR / RETURN)",
      body: `<div class="definition">Variables store intermediate results in DAX formulas, evaluated once at the point of declaration — improving both readability and performance.</div><div class="code-snippet"><span class="kw">VAR</span> CurrentSales = <span class="fn">SUM</span>(Sales[Amount])
<span class="kw">VAR</span> LastYearSales =
    <span class="fn">CALCULATE</span>(<span class="fn">SUM</span>(Sales[Amount]),
        <span class="fn">SAMEPERIODLASTYEAR</span>('Date'[Date]))
<span class="kw">RETURN</span>
    <span class="fn">DIVIDE</span>(CurrentSales - LastYearSales, LastYearSales)</div><div class="how-it-works"><div class="label">Benefits</div><ul><li>Calculated once — no repeated evaluation of the same sub-expression</li><li>Much easier to read and debug step by step</li><li>Variables preserve filter context at the point they are declared</li></ul></div><div class="interview-tip">Always write complex DAX with variables. It shows professional coding habits and interviewers appreciate clean, readable formulas.</div>` },
    { accent: "red",    tag: "key",  tagLabel: "Key Topic",  title: "RELATED(), RELATEDTABLE() and LOOKUPVALUE()",
      body: `<div class="definition">Functions to cross-reference values between related tables in calculated columns.<br><strong>RELATED</strong>: fetch a value from the "one" side.<br><strong>RELATEDTABLE</strong>: returns a table from the "many" side.<br><strong>LOOKUPVALUE</strong>: fetch a value without a formal relationship.</div><div class="code-snippet"><span class="cm">-- In a calculated column on the Sales table:</span>
Category = <span class="fn">RELATED</span>(Products[Category])

<span class="cm">-- Count orders per customer:</span>
Order Count = <span class="fn">COUNTROWS</span>(<span class="fn">RELATEDTABLE</span>(Orders))</div><div class="interview-tip">LOOKUPVALUE is the VLOOKUP of DAX — mention it when explaining how to pull values when no relationship exists between tables.</div>` }
  ]
},
{
  title: "Power Query", icon: "Wrench",
  intro: "Power Query is the ETL layer inside Power BI Desktop. Every transformation you perform through the UI generates M code behind the scenes. Interviewers want to know you can clean data effectively and understand performance implications.",
  cards: [
    { accent: "blue",   tag: "core", tagLabel: "Core",      title: "The Power Query Editor Interface",
      body: `<div class="definition">A step-by-step transformation tool where each action creates an Applied Step in M code. All steps are non-destructive — you can insert, remove, or modify any step.</div><div class="how-it-works"><div class="label">Key panes to know</div><ul><li><strong>Queries pane (left)</strong> — lists all loaded tables and queries</li><li><strong>Applied Steps (right)</strong> — shows every transformation in order</li><li><strong>Formula bar</strong> — shows the M code for the selected step</li><li><strong>Column Profile / Column Quality</strong> — data profiling tools found in the View tab</li></ul></div><div class="practice-box">In your report, open Power Query Editor and count the number of Applied Steps in your most complex query.</div>` },
    { accent: "teal",   tag: "key",  tagLabel: "Key Topic",  title: "Query Folding",
      body: `<div class="definition">Query folding is when Power Query translates your M transformations back into a native query (SQL, OData, etc.) executed on the source system — rather than pulling all data and filtering locally.</div><div class="how-it-works"><div class="label">Why it matters</div><ul><li>Dramatically reduces the amount of data transferred over the network</li><li>Leverages the source database's indexing and query optimizer</li><li>Incremental refresh requires query folding to work</li></ul><div class="label" style="margin-top:10px">How to check</div><ul><li>Right-click a step in Applied Steps and select "View Native Query" — if enabled, it folds</li><li>Steps that break folding include: custom columns with complex M, merging non-relational sources, certain text operations</li></ul></div><div class="interview-tip">Always filter rows and select only needed columns early in the query to maximize folding and minimize data transfer.</div>` },
    { accent: "orange", tag: "core", tagLabel: "Core",      title: "Merge Queries (Joins) vs. Append Queries (Union)",
      body: `<div class="definition"><strong>Merge</strong> = SQL JOIN — combines columns from two tables based on a matching key.<br><strong>Append</strong> = SQL UNION — stacks rows from two tables with the same structure.</div><table class="compare-table"><tr><th>Operation</th><th>SQL Equivalent</th><th>When to Use</th></tr><tr><td>Merge (Inner)</td><td>INNER JOIN</td><td>Only matching rows from both</td></tr><tr><td>Merge (Left Outer)</td><td>LEFT JOIN</td><td>All from left, matched from right</td></tr><tr><td>Merge (Full Outer)</td><td>FULL OUTER JOIN</td><td>All rows from both tables</td></tr><tr><td>Append</td><td>UNION ALL</td><td>Combine same-structure tables (e.g., 12 monthly files)</td></tr></table><div class="interview-tip">Common task: "We get 12 separate monthly Excel files — how do you combine them?" Answer: Append Queries, or point to a folder and use Combine Files.</div>` },
    { accent: "purple", tag: "adv",  tagLabel: "Advanced",  title: "M Language Basics",
      body: `<div class="definition">M (Mashup) is the functional language that Power Query generates. You rarely write it from scratch, but editing it directly lets you do things the UI cannot.</div><div class="how-it-works"><div class="label">M query structure</div></div><div class="code-snippet"><span class="kw">let</span>
    Source = <span class="fn">Sql.Database</span>(<span class="st">"server"</span>, <span class="st">"db"</span>),
    SalesTable = Source{[Schema=<span class="st">"dbo"</span>,Item=<span class="st">"Sales"</span>]}[Data],
    FilteredRows = <span class="fn">Table.SelectRows</span>(SalesTable,
        each [Year] = 2024),
    RenamedCols = <span class="fn">Table.RenameColumns</span>(FilteredRows,
        {{<span class="st">"Amt"</span>, <span class="st">"Amount"</span>}})
<span class="kw">in</span>
    RenamedCols</div><div class="interview-tip">Understanding the let...in structure and being able to read and tweak generated M code is expected at mid-senior levels.</div>` },
    { accent: "green",  tag: "",     tagLabel: "",           title: "Common Transformations to Know",
      body: `<div class="how-it-works"><div class="label">Frequently asked about in interviews</div><ul><li><strong>Remove Duplicates</strong> — deduplication on key columns</li><li><strong>Pivot / Unpivot</strong> — reshaping wide tables to narrow (unpivot) or vice versa</li><li><strong>Split Column</strong> — parse "First Last" into separate columns</li><li><strong>Replace Errors / Replace Values</strong> — handle nulls and bad data</li><li><strong>Group By</strong> — aggregate rows (like SQL GROUP BY)</li><li><strong>Custom Column</strong> — write M expressions for derived fields</li><li><strong>Conditional Column</strong> — IF/THEN logic without coding</li></ul></div><div class="practice-box">In your report, identify one query that uses unpivot, one that uses Group By, and be ready to explain why each was needed.</div>` }
  ]
},
{
  title: "Performance Optimization", icon: "Lightning",
  intro: "Slow reports are one of the most common production problems. Interviewers expect you to diagnose bottlenecks and explain the internal mechanics that drive Power BI's performance.",
  cards: [
    { accent: "blue",   tag: "core", tagLabel: "Core",      title: "VertiPaq Engine (xVelocity / In-Memory)",
      body: `<div class="definition">VertiPaq is Power BI's in-memory columnar storage engine. It compresses data by column and loads it into RAM, enabling extremely fast aggregations without traditional indexing.</div><div class="how-it-works"><div class="label">How compression works</div><ul><li><strong>Value encoding</strong> — stores unique values once in a dictionary, then stores integer pointers per row</li><li><strong>Run-length encoding</strong> — if 10,000 rows have the same value, stores it as "10,000 x value" instead of repeating it</li><li><strong>Low cardinality = better compression</strong> — a "Country" column with 50 unique values compresses far better than a "TransactionID" with millions</li></ul></div><div class="interview-tip">To improve VertiPaq performance: reduce cardinality, remove unused columns, avoid calculated columns on large fact tables, and set correct data types.</div>` },
    { accent: "teal",   tag: "core", tagLabel: "Core",      title: "Import Mode vs. DirectQuery vs. Composite",
      body: `<table class="compare-table"><tr><th>Mode</th><th>How it works</th><th>Best for</th><th>Trade-offs</th></tr><tr><td><strong>Import</strong></td><td>Data loaded into VertiPaq at refresh</td><td>Most reports; under 1B rows</td><td>Data is only as fresh as last refresh</td></tr><tr><td><strong>DirectQuery</strong></td><td>Every visual sends a live SQL query to source</td><td>Real-time data needs</td><td>Slower; limited DAX features; source load</td></tr><tr><td><strong>Dual</strong></td><td>Table acts as both Import and DQ depending on query</td><td>Dimensions in Composite models</td><td>Complexity in mixed scenarios</td></tr><tr><td><strong>Composite</strong></td><td>Mix of Import and DQ tables in one model</td><td>Real-time fact plus cached dimensions</td><td>Requires careful design</td></tr></table><div class="interview-tip">Default answer: "I use Import mode unless real-time data is a hard requirement, because DirectQuery significantly impacts visual render time and limits DAX functionality."</div>` },
    { accent: "orange", tag: "adv",  tagLabel: "Advanced",  title: "Performance Analyzer and DAX Studio",
      body: `<div class="definition"><strong>Performance Analyzer</strong> (built into Desktop) records how long each visual takes: DAX query time, visual display time, and other overhead.<br><strong>DAX Studio</strong> (free external tool) lets you run and profile DAX queries, see storage engine vs. formula engine breakdown, and analyze VertiPaq statistics.</div><div class="how-it-works"><div class="label">Optimization workflow</div><ul><li>1. Use Performance Analyzer to find the slowest visual</li><li>2. Copy its DAX query and paste into DAX Studio</li><li>3. Check Server Timings — if Formula Engine (FE) time is high, the DAX logic is inefficient</li><li>4. If the query hits Storage Engine (SE) many times, consider adding aggregations</li></ul></div><div class="interview-tip">Mentioning DAX Studio in an interview signals hands-on experience. Even understanding what it measures is valuable at mid-level interviews.</div>` },
    { accent: "green",  tag: "",     tagLabel: "",           title: "Best Practices for Fast Reports",
      body: `<div class="how-it-works"><div class="label">Model-level optimizations</div><ul><li>Remove unused columns and tables from the model</li><li>Use integer keys for relationships instead of text</li><li>Avoid M:M relationships — use bridge tables</li><li>Set correct data types (Date not Text, Integer not Decimal where possible)</li></ul><div class="label" style="margin-top:10px">DAX optimizations</div><ul><li>Avoid FILTER(ALL(Table)) — use CALCULATETABLE with filter arguments instead</li><li>Use variables to avoid duplicate sub-expression evaluation</li><li>Prefer SUM over SUMX where a column already exists</li></ul><div class="label" style="margin-top:10px">Report-level optimizations</div><ul><li>Limit visuals per page — each visual fires a separate DAX query</li><li>Use Basic slicer interaction — avoid bi-directional cross-filtering</li><li>Consider Aggregations for very large datasets</li></ul></div>` },
    { accent: "red",    tag: "key",  tagLabel: "Key Topic",  title: "Pre-Aggregated Tables — Real-World Optimization",
      body: `<div class="definition">When visuals query a large fact table directly, each visual fires a full aggregation scan across millions of rows on every page load. Pre-aggregating data into a compact summary table inside Power Query lets visuals query the summary instead — dramatically cutting query and render time.</div><div class="how-it-works"><div class="label">Real-world problem we encountered</div><ul><li>A large report connected to multiple datasets with tens of millions of rows caused several visuals to take 15–30 seconds to render on each page load</li><li>A developer traced the bottleneck using Performance Analyzer: the slow visuals were all aggregating the same raw fact table at different grains on every interaction</li><li>The fix: in Power Query, a new <strong>Group By</strong> query was created that pre-aggregated the fact table at the required grain (Month, Region, Product Category) — producing a compact summary of a few thousand rows</li><li>The slow visuals were re-pointed to this summary table instead of the raw fact table — render time dropped from 20+ seconds to under 2 seconds</li></ul></div><div class="how-it-works"><div class="label">How to create a pre-aggregated table in Power Query</div><ul><li>1. In Power Query Editor, right-click the fact table query → <strong>Reference</strong> (creates a downstream query that stays in sync with the source)</li><li>2. On the referenced query: <em>Home → Group By</em> → select the dimension columns to aggregate by (e.g., Year, Month, Region, Category) and define the aggregations (Sum of Amount, Count of Orders)</li><li>3. Name the query clearly (e.g., "Sales_Summary_Monthly") and confirm it is enabled to load to the model</li><li>4. In Model view, create relationships between the summary table and the existing dimension tables using the same key columns</li><li>5. Re-configure the affected slow visuals to use fields from the summary table instead of the raw fact table</li></ul></div><div class="how-it-works"><div class="label">Manual summary table vs. Power BI Aggregations</div><ul><li><strong>Manual summary table (this approach)</strong> — simpler, works in all license tiers; the developer explicitly points visuals to the summary table</li><li><strong>Power BI Aggregations</strong> (Premium feature) — the DAX engine automatically routes visual queries to an aggregation table when the filter grain matches; existing visuals need no changes</li></ul></div><div class="practice-box">Use Performance Analyzer to find your slowest visual. If its DAX query scans a large fact table, create a Group By summary in Power Query, re-point the visual, and measure the before/after render time.</div>` }
  ]
},
{
  title: "Security and Governance", icon: "Lock",
  intro: "Security is non-negotiable in enterprise BI. Interviewers expect you to explain how you protect sensitive data at the row, column, and workspace level.",
  cards: [
    { accent: "red",    tag: "core", tagLabel: "Core",      title: "Row-Level Security (RLS)",
      body: `<div class="definition">RLS restricts which rows a user can see in a dataset. You define roles with DAX filter expressions in Power BI Desktop; role membership is assigned in the Service.</div><div class="how-it-works"><div class="label">How to set up RLS</div><ul><li>1. In Desktop: Modeling tab, Manage Roles, create a role with a DAX filter e.g. [Region] = "West"</li><li>2. Publish to Service, then in Dataset settings, go to Security and assign users to roles</li><li>3. When a "West" user opens the report, they only see West Region data automatically</li></ul><div class="label" style="margin-top:10px">Dynamic RLS (most important)</div></div><div class="code-snippet"><span class="cm">-- Role filter uses the logged-in user's email:</span>
[Email] = <span class="fn">USERPRINCIPALNAME</span>()</div><div class="how-it-works"><ul><li>Dynamic RLS maps each user to their allowed rows via a mapping table — one role serves all users</li><li>Static RLS requires a separate role per group — harder to maintain</li></ul></div><div class="interview-tip">Always prefer dynamic RLS for scalability. Be ready to draw the relationship: User Email Table linked to the fact or dimension that controls access.</div>` },
    { accent: "purple", tag: "adv",  tagLabel: "Advanced",  title: "Object-Level Security (OLS)",
      body: `<div class="definition">OLS hides entire tables or specific columns from users in certain roles. Unlike RLS (which filters rows), OLS makes the object completely invisible — users cannot even see the column name.</div><div class="how-it-works"><div class="label">Use cases</div><ul><li>Hide a "Salary" column from non-HR roles</li><li>Hide a sensitive "SSN" or "CreditCardNumber" table entirely</li><li>Not configurable from the Power BI Desktop UI alone — requires Tabular Editor</li></ul></div><div class="how-it-works"><div class="label">How to implement OLS using Tabular Editor</div><ul><li>1. Download and install <strong>Tabular Editor 2</strong> (free, open source) — once installed, it appears under the <em>External Tools</em> ribbon in Power BI Desktop</li><li>2. Open your .pbix in Desktop, then click <strong>Tabular Editor</strong> in the External Tools tab to connect it live to the model</li><li>3. In Tabular Editor's left pane, expand <em>Tables</em> → expand the target table → right-click a specific column or the whole table → select <strong>Object Level Security</strong></li><li>4. In the OLS dialog, select the role you created in Power BI Desktop and set permission to <strong>None</strong> (object completely hidden — the column name is invisible to that role) or <strong>Read</strong></li><li>5. Save in Tabular Editor (Ctrl+S) — changes are written back into the open .pbix automatically</li><li>6. Publish to the Service; then in Dataset → <strong>Security</strong> settings, use <em>Test as role</em> to confirm the column or table is not visible for that role</li></ul></div><div class="interview-tip">OLS is an advanced topic. Mentioning it alongside RLS shows you know the difference between filtering data (RLS) vs. hiding schema (OLS).</div>` },
    { accent: "orange", tag: "core", tagLabel: "Core",      title: "Workspace Roles and Licensing",
      body: `<div class="definition">Access to Power BI Service features is controlled by workspace roles and Pro/Premium licenses.</div><table class="compare-table"><tr><th>Role</th><th>Can Publish?</th><th>Can Edit?</th><th>Can View?</th></tr><tr><td>Admin</td><td>Yes</td><td>Yes</td><td>Yes</td></tr><tr><td>Member</td><td>Yes</td><td>Yes</td><td>Yes</td></tr><tr><td>Contributor</td><td>Yes</td><td>Yes (no publish)</td><td>Yes</td></tr><tr><td>Viewer</td><td>No</td><td>No</td><td>Yes</td></tr></table><div class="how-it-works"><div class="label" style="margin-top:10px">Licensing</div><ul><li><strong>Free</strong> — personal use only; cannot share</li><li><strong>Pro</strong> — share with other Pro users; required for publishing to shared workspaces</li><li><strong>Premium Per User (PPU)</strong> — premium features per person</li><li><strong>Premium Capacity (P-SKU)</strong> — dedicated capacity; viewers do not need Pro licenses</li></ul></div><div class="interview-tip">Common scenario: "How do you share a report with 500 users who do not have Pro licenses?" Answer: Publish to a Premium Capacity workspace or use Embedded.</div>` },
    { accent: "teal",   tag: "",     tagLabel: "",           title: "Sensitivity Labels and Information Protection",
      body: `<div class="definition">Microsoft Information Protection (MIP) labels (e.g., Confidential, Public) can be applied to datasets and reports in Power BI Service, enforcing downstream export restrictions.</div><div class="how-it-works"><ul><li>Labels are inherited — if a dataset is "Confidential", reports built on it inherit that label</li><li>Export to Excel may be blocked or watermarked for sensitive labels</li><li>Requires Azure Information Protection integration and appropriate tenant settings</li></ul></div><div class="interview-tip">For governance-focused roles, mentioning sensitivity labels shows enterprise-level awareness beyond just RLS.</div>` }
  ]
},
{
  title: "SQL", icon: "Database",
  intro: "SQL is the language of data. As a Power BI developer, you use SQL to query source systems, write stored procedures, and understand how data is structured before pulling it into Power BI.",
  cards: [
    { accent: "blue",   tag: "core", tagLabel: "Core",      title: "JOINs — The Most Tested SQL Topic",
      body: `<div class="definition">A JOIN combines rows from two tables based on a matching key column.</div><table class="compare-table"><tr><th>Join Type</th><th>Returns</th><th>Use When</th></tr><tr><td>INNER JOIN</td><td>Only rows with a match in both tables</td><td>You only want related records</td></tr><tr><td>LEFT JOIN</td><td>All from left, matching from right (NULLs where no match)</td><td>Keep all customers even without orders</td></tr><tr><td>RIGHT JOIN</td><td>All from right, matching from left</td><td>Rare — usually rewrite as LEFT JOIN</td></tr><tr><td>FULL OUTER JOIN</td><td>All rows from both, NULLs where no match</td><td>Reconciliation, gap analysis</td></tr><tr><td>CROSS JOIN</td><td>Every combination of rows (Cartesian product)</td><td>Generating date/product combinations</td></tr></table><div class="code-snippet"><span class="kw">SELECT</span> c.CustomerName, o.OrderDate, o.Amount
<span class="kw">FROM</span> Customers c
<span class="kw">LEFT JOIN</span> Orders o <span class="kw">ON</span> c.CustomerID = o.CustomerID
<span class="kw">WHERE</span> o.Amount > 1000</div>` },
    { accent: "teal",   tag: "key",  tagLabel: "Key Topic",  title: "Window Functions",
      body: `<div class="definition">Window functions perform calculations across a set of rows related to the current row without collapsing rows like GROUP BY does. They use an OVER() clause.</div><div class="how-it-works"><div class="label">Most important window functions</div><ul><li><strong>ROW_NUMBER()</strong> — unique sequential row number within a partition</li><li><strong>RANK()</strong> — rank with gaps for ties (1, 1, 3)</li><li><strong>DENSE_RANK()</strong> — rank without gaps (1, 1, 2)</li><li><strong>LAG() / LEAD()</strong> — access previous or next row's value</li><li><strong>SUM() OVER()</strong> — running total</li></ul></div><div class="code-snippet"><span class="cm">-- Rank employees by salary within each department</span>
<span class="kw">SELECT</span> Name, Department, Salary,
    <span class="fn">DENSE_RANK</span>() <span class="kw">OVER</span> (
        <span class="kw">PARTITION BY</span> Department
        <span class="kw">ORDER BY</span> Salary <span class="kw">DESC</span>
    ) <span class="kw">AS</span> SalaryRank
<span class="kw">FROM</span> Employees</div><div class="interview-tip">Classic interview question: "Get the top 3 sales reps per region." Solution uses ROW_NUMBER() with PARTITION BY Region ORDER BY Sales DESC, then filter WHERE RowNum less than or equal to 3.</div>` },
    { accent: "orange", tag: "core", tagLabel: "Core",      title: "CTEs and Subqueries",
      body: `<div class="definition">A <strong>CTE (Common Table Expression)</strong> is a named temporary result set defined with WITH. It improves readability and enables recursion. A <strong>subquery</strong> is a query nested inside another query.</div><div class="code-snippet"><span class="cm">-- CTE: cleaner than a subquery</span>
<span class="kw">WITH</span> MonthlySales <span class="kw">AS</span> (
    <span class="kw">SELECT</span> Month, <span class="fn">SUM</span>(Amount) <span class="kw">AS</span> TotalSales
    <span class="kw">FROM</span> Orders
    <span class="kw">GROUP BY</span> Month
)
<span class="kw">SELECT</span> Month, TotalSales,
    <span class="fn">LAG</span>(TotalSales) <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> Month) <span class="kw">AS</span> PrevMonth
<span class="kw">FROM</span> MonthlySales</div><div class="interview-tip">Prefer CTEs over nested subqueries in interviews — they are easier to read and show cleaner SQL thinking. Use multiple CTEs to break complex logic into steps.</div>` },
    { accent: "green",  tag: "",     tagLabel: "",           title: "Aggregation, GROUP BY and HAVING",
      body: `<div class="definition">GROUP BY groups rows with the same value into summary rows. HAVING filters those grouped results (equivalent to WHERE but applied after aggregation).</div><div class="code-snippet"><span class="kw">SELECT</span> Region, <span class="fn">SUM</span>(Sales) <span class="kw">AS</span> TotalSales,
       <span class="fn">COUNT</span>(DISTINCT CustomerID) <span class="kw">AS</span> UniqueCustomers
<span class="kw">FROM</span> Orders
<span class="kw">WHERE</span> OrderYear = 2024
<span class="kw">GROUP BY</span> Region
<span class="kw">HAVING</span> <span class="fn">SUM</span>(Sales) > 50000
<span class="kw">ORDER BY</span> TotalSales <span class="kw">DESC</span></div><div class="analogy">WHERE filters individual rows before grouping. HAVING filters groups after aggregation — like filtering the summary table.</div>` },
    { accent: "purple", tag: "adv",  tagLabel: "Advanced",  title: "Indexes, Execution Plans and Query Optimization",
      body: `<div class="definition">An <strong>index</strong> is a data structure that speeds up row lookups at the cost of storage. An <strong>execution plan</strong> shows the steps the query engine will take to execute your SQL.</div><div class="how-it-works"><div class="label">Key optimization tips</div><ul><li>Avoid SELECT * — select only columns you need</li><li>Filter early with WHERE on indexed columns</li><li>Avoid functions on indexed columns in WHERE — use date ranges instead: WHERE OrderDate >= '2024-01-01'</li><li>Use clustered indexes on date and ID columns in fact tables</li><li>Check execution plans for Table Scans — replace with Seeks via indexes</li></ul></div><div class="interview-tip">In a Power BI context: "I push row filters into Power Query early so they fold to the SQL source, and I work with the database team to ensure proper indexing on join keys."</div>` }
  ]
},
{
  title: "ETL Concepts", icon: "Flow",
  intro: "ETL (Extract, Transform, Load) is the backbone of any data pipeline. Understanding the principles helps you design scalable, maintainable data flows — a core expectation for BI developers.",
  cards: [
    { accent: "blue",   tag: "core", tagLabel: "Core",      title: "ETL vs. ELT",
      body: `<div class="definition"><strong>ETL</strong>: Extract, Transform (in a staging area), then Load into destination.<br><strong>ELT</strong>: Extract, Load raw data into destination first, then Transform using the destination's compute power.</div><table class="compare-table"><tr><th>Aspect</th><th>ETL</th><th>ELT</th></tr><tr><td>Transformation location</td><td>External tool (SSIS, ADF)</td><td>Inside the target (SQL, Spark)</td></tr><tr><td>Raw data preserved?</td><td>No (transformed before load)</td><td>Yes (raw layer always exists)</td></tr><tr><td>Best for</td><td>Legacy, on-prem warehouses</td><td>Cloud data warehouses (Synapse, Snowflake)</td></tr><tr><td>Flexibility to re-transform</td><td>Low</td><td>High (raw data always available)</td></tr></table><div class="interview-tip">ELT is the modern standard for cloud-based analytics. Say: "Our pipeline uses ELT — we land raw data in ADLS, then transform inside Synapse using SQL scripts."</div>` },
    { accent: "teal",   tag: "key",  tagLabel: "Key Topic",  title: "Slowly Changing Dimensions (SCD)",
      body: `<div class="definition">SCD describes how dimension data changes over time. For example, a customer moves to a new city — should reports show the old city, the new one, or both?</div><div class="how-it-works"><div class="label">The three main SCD types</div><ul><li><strong>Type 0</strong> — No change. Values are fixed and never updated (e.g., birth date)</li><li><strong>Type 1</strong> — Overwrite. Old value is replaced. No history kept. Simple but loses the past (e.g., fix a typo in a name)</li><li><strong>Type 2</strong> — Add a new row. Old row is closed with an end date; new row is added. Full history preserved. Requires a surrogate key and IsActive flag</li><li><strong>Type 3</strong> — Add a new column (e.g., PreviousCity, CurrentCity). Limited history, only one change tracked</li></ul></div><div class="interview-tip">SCD Type 2 is the most commonly asked about. Practice explaining: "I add StartDate, EndDate, and IsCurrent columns to the Customer dimension, creating a new row each time an attribute changes."</div>` },
    { accent: "orange", tag: "core", tagLabel: "Core",      title: "Incremental Refresh in Power BI",
      body: `<div class="definition">Instead of reloading the entire dataset on every refresh, incremental refresh only processes new or changed rows — dramatically reducing refresh time for large tables.</div><div class="how-it-works"><div class="label">Requirements</div><ul><li>A date/datetime column to partition by (e.g., OrderDate)</li><li>Power Query parameters named <strong>exactly</strong> RangeStart and RangeEnd (type: Date/Time)</li><li>Query folding must be active on the filter step</li><li>Premium or PPU license for full capabilities</li></ul></div><div class="how-it-works"><div class="label">Step-by-step implementation</div><ul><li>1. In Power Query Editor: <em>Home → Manage Parameters → New Parameter</em> — create <strong>RangeStart</strong> (Type: Date/Time) and <strong>RangeEnd</strong> (Type: Date/Time) with appropriate default values</li><li>2. On the fact table, filter the date column: right-click the date column header → <em>Date/Time Filters → After or Equal to</em> → select RangeStart parameter; add a second filter → <em>Before</em> → RangeEnd</li><li>3. Right-click the filter step in Applied Steps → <em>View Native Query</em> — if a SQL window appears, query folding is active (required for incremental refresh to work correctly)</li><li>4. Close and Apply, then right-click the table in the Fields pane → <strong>Incremental refresh and real-time data</strong></li><li>5. Toggle on incremental refresh: set <em>Archive data starting X years before refresh date</em> (historical window) and <em>Incrementally refresh data starting Y days before refresh date</em> (refresh window)</li><li>6. Optionally enable <em>Detect data changes</em> using a last-modified timestamp column — only rows that changed are reprocessed, reducing load further</li><li>7. Publish to a <strong>Premium or PPU workspace</strong> — the first publish imports all historical data; all subsequent scheduled refreshes load only the recent partition</li></ul></div><div class="how-it-works"><div class="label">How it works internally</div><ul><li>Power BI partitions the table by date periods (e.g., each month becomes one internal partition)</li><li>Only the most recent partitions are refreshed; older partitions remain frozen</li><li>Example: "Keep 3 years of history; refresh only the last 10 days on each run"</li></ul></div><div class="interview-tip">This is a senior-level topic. Mentioning it when asked about "handling large datasets" shows strong production experience.</div>` },
    { accent: "purple", tag: "",     tagLabel: "",           title: "Surrogate Keys vs. Natural Keys",
      body: `<div class="definition"><strong>Natural key</strong>: a business identifier from source data (e.g., CustomerID = "CUST-001").<br><strong>Surrogate key</strong>: a system-generated integer key with no business meaning, used to uniquely identify dimension rows in the warehouse.</div><div class="how-it-works"><div class="label">Why surrogate keys matter</div><ul><li>Support SCD Type 2 — multiple versions of the same customer can exist with different surrogate keys</li><li>Integers join faster and compress better than strings</li><li>Isolate the model from source system changes</li></ul></div><div class="analogy">A surrogate key is like a library book number — the publisher's ISBN (natural key) might change across editions, but the library's internal number stays stable.</div>` }
  ]
},
{
  title: "Cloud and Integration", icon: "Cloud",
  intro: "Modern BI runs on cloud infrastructure. Power BI integrates tightly with the Azure ecosystem. Understanding where data lives, how it moves, and what each service does is essential for enterprise roles.",
  cards: [
    { accent: "blue",   tag: "core", tagLabel: "Core",      title: "Azure Data Lake Storage (ADLS Gen2)",
      body: `<div class="definition">A cloud-based hierarchical storage service optimized for big data analytics. It acts as the central raw and curated data repository in modern data architectures.</div><div class="how-it-works"><div class="label">Typical data lake zones</div><ul><li><strong>Raw / Bronze</strong> — original source files as-is (CSV, JSON, Parquet)</li><li><strong>Curated / Silver</strong> — cleaned, standardized data</li><li><strong>Enriched / Gold</strong> — aggregated, business-ready tables that Power BI reads from</li></ul></div><div class="analogy">A data lake is like a warehouse with shelves of raw materials (bronze), processed parts (silver), and finished products (gold) — Power BI is the showroom.</div><div class="interview-tip">Be ready to say which zone Power BI connects to. "We connect Power BI to the Gold layer in ADLS, which contains pre-aggregated, validated tables."</div>` },
    { accent: "teal",   tag: "core", tagLabel: "Core",      title: "Azure Synapse Analytics",
      body: `<div class="definition">A unified platform combining enterprise data warehousing (dedicated SQL pools), big data analytics (Spark), and data integration pipelines — all in one service.</div><div class="how-it-works"><div class="label">Components relevant to Power BI</div><ul><li><strong>Dedicated SQL Pool</strong> — a fully managed MPP data warehouse. Power BI connects via Import or DirectQuery</li><li><strong>Serverless SQL Pool</strong> — query files in ADLS directly using SQL without provisioning compute</li><li><strong>Synapse Link for Power BI</strong> — publish datasets directly from Synapse workspace</li></ul></div><div class="interview-tip">Key sentence to remember: "Synapse is our data warehouse layer — it stores the fact and dimension tables that Power BI's datasets are built on."</div>` },
    { accent: "orange", tag: "",     tagLabel: "",           title: "Azure Data Factory (ADF)",
      body: `<div class="definition">A fully managed cloud ETL/ELT orchestration service. ADF moves and transforms data between 90+ connectors (databases, APIs, files, SaaS apps) and coordinates pipeline execution.</div><div class="how-it-works"><div class="label">Core ADF concepts</div><ul><li><strong>Pipeline</strong> — a logical grouping of activities (like a workflow)</li><li><strong>Activity</strong> — a single task: Copy Data, Stored Procedure, Databricks Notebook, etc.</li><li><strong>Linked Service</strong> — a connection string to a source or destination</li><li><strong>Dataset</strong> — a reference to the data structure within a linked service</li><li><strong>Trigger</strong> — schedules, event-based, or tumbling window execution</li></ul></div><div class="interview-tip">In a Power BI context: "ADF orchestrates our nightly pipeline — it copies raw data from SQL Server to ADLS Bronze, runs transformation notebooks, and triggers the Power BI dataset refresh via the REST API."</div>` },
    { accent: "purple", tag: "adv",  tagLabel: "Advanced",  title: "Azure Databricks and Apache Spark",
      body: `<div class="definition">Databricks is a managed Apache Spark platform for large-scale data engineering, machine learning, and streaming analytics. Spark processes data in parallel across a cluster — far faster than single-node SQL for huge datasets.</div><div class="how-it-works"><div class="label">How it fits with Power BI</div><ul><li>Databricks transforms raw data in ADLS and writes to Delta tables or Synapse</li><li>Power BI connects to Delta tables via the Databricks connector or Synapse</li><li>Delta Lake format adds ACID transactions and time travel to data lake files</li></ul></div><div class="interview-tip">You do not need to write Spark code for a Power BI role, but understanding its place in the pipeline is expected in senior or cloud-focused positions.</div>` }
  ]
},
{
  title: "Analytics and BI Concepts", icon: "Chart",
  intro: "Beyond technical skills, interviewers assess your understanding of BI principles — how to choose the right visual, structure a report for business impact, and communicate insights clearly.",
  cards: [
    { accent: "blue",   tag: "core", tagLabel: "Core",      title: "KPIs — Design and Communication",
      body: `<div class="definition">A KPI (Key Performance Indicator) is a measurable value that demonstrates how effectively an organization is achieving its objectives.</div><div class="how-it-works"><div class="label">What makes a good KPI?</div><ul><li><strong>Specific</strong> — tied to a clear business question (not just "total sales")</li><li><strong>Comparable</strong> — shown against a target, prior period, or benchmark</li><li><strong>Actionable</strong> — the audience can do something based on the insight</li></ul><div class="label" style="margin-top:10px">Power BI KPI visual elements</div><ul><li>Indicator value (current measure)</li><li>Goal/target value</li><li>Trend axis (usually a date)</li><li>Color coding: green = on target, red = below, yellow = at risk</li></ul></div><div class="interview-tip">When asked "what KPIs does your report show?", connect each metric to a business question: "Revenue vs. Target answers Are we on track to meet quota?"</div>` },
    { accent: "teal",   tag: "core", tagLabel: "Core",      title: "Drillthrough, Drill-Down and Cross-Filtering",
      body: `<div class="definition"><strong>Drill-Down</strong>: navigate within a hierarchy on the same visual (Year to Quarter to Month to Day).<br><strong>Drillthrough</strong>: right-click a data point to navigate to a separate detail page filtered to that context.<br><strong>Cross-filtering</strong>: clicking a visual automatically filters other visuals on the page.</div><div class="how-it-works"><div class="label">When to use each</div><ul><li><strong>Drill-down</strong> — when the user needs date or category hierarchy exploration in one chart</li><li><strong>Drillthrough</strong> — when detail is too complex for the summary page (e.g., individual transactions)</li><li><strong>Cross-filtering</strong> — when a selection in one visual should act as a slicer for the whole page</li></ul></div><div class="practice-box">Set up a drillthrough page for a specific product or region, showing individual transactions with a Back button.</div>` },
    { accent: "orange", tag: "key",  tagLabel: "Key Topic",  title: "Choosing the Right Visual",
      body: `<div class="definition">Visual selection is one of the most practical interview topics. The wrong visual confuses the audience; the right one makes the insight instantly obvious.</div><table class="compare-table"><tr><th>Goal</th><th>Best Visual(s)</th></tr><tr><td>Compare values across categories</td><td>Bar / Column chart</td></tr><tr><td>Show trend over time</td><td>Line chart, Area chart</td></tr><tr><td>Show part-to-whole composition</td><td>Donut, Stacked bar (avoid pie for 5+ slices)</td></tr><tr><td>Show relationships or correlations</td><td>Scatter chart</td></tr><tr><td>Dense multi-row comparison</td><td>Matrix (table with subtotals)</td></tr><tr><td>Geographic data</td><td>Map, Filled Map, Azure Map</td></tr><tr><td>Single metric vs. target</td><td>KPI visual, Gauge, Card</td></tr><tr><td>Distribution or outliers</td><td>Box plot, Scatter</td></tr></table><div class="interview-tip">Avoid pie charts with more than 4-5 slices. Interviewers may show you a bad visual and ask how you would improve it — have opinions ready.</div>` },
    { accent: "purple", tag: "",     tagLabel: "",           title: "Report Design Principles",
      body: `<div class="how-it-works"><div class="label">Layout and UX best practices</div><ul><li><strong>F-pattern / Z-pattern reading</strong> — place most important KPIs top-left</li><li><strong>White space</strong> — avoid cluttering; give visuals room to breathe</li><li><strong>Consistent color palette</strong> — use corporate colors; never use color just for decoration</li><li><strong>Minimal tooltip text</strong> — labels should state what the visual cannot show alone</li><li><strong>Mobile layout</strong> — use Phone View in Desktop for executive dashboards</li></ul><div class="label" style="margin-top:10px">Common mistakes to avoid</div><ul><li>Too many visuals on one page (performance and cognitive overload)</li><li>Inconsistent date granularity across charts</li><li>3D charts that distort perception</li><li>Unlabeled axes or missing units ($, %, K)</li></ul></div><div class="interview-tip">When asked about a report design decision, always tie it back to the user: "I put the YTD Revenue card at the top because that is the first question executives ask."</div>` }
  ]
},
{
  title: "Scenario-Based Skills", icon: "Target",
  intro: "Scenario questions test whether you can translate technical skills into business outcomes. Interviewers want to see your process — how you gather requirements, solve problems, and communicate results.",
  cards: [
    { accent: "blue",   tag: "core", tagLabel: "Core",      title: "Requirement Gathering",
      body: `<div class="definition">The structured process of understanding what the business actually needs before writing a single line of DAX or building a visual.</div><div class="how-it-works"><div class="label">A practical framework</div><ul><li><strong>Who</strong> are the consumers? (executives, operations, finance)</li><li><strong>What</strong> decisions will this report support?</li><li><strong>What data</strong> sources are available? What are the grain and refresh needs?</li><li><strong>What</strong> does "success" look like? (KPIs, target values)</li><li><strong>What</strong> do they already have? (existing Excel reports reveal real needs)</li></ul></div><div class="interview-tip">Tell the story of your report: "The sales director came to us with a 40-tab Excel workbook. I ran a 1-hour discovery session with 3 stakeholders and reduced it to 2 Power BI pages covering the same insights."</div>` },
    { accent: "teal",   tag: "core", tagLabel: "Core",      title: "Data Storytelling",
      body: `<div class="definition">Structuring a report so that the data leads the viewer through a narrative — from context, to problem, to insight, to recommended action.</div><div class="how-it-works"><div class="label">The 3-layer report structure</div><ul><li><strong>Page 1 — Executive Summary</strong>: high-level KPIs, trend lines, alert indicators</li><li><strong>Page 2 — Analysis</strong>: break-down by dimension (region, product, time), comparisons</li><li><strong>Page 3 — Details / Drillthrough</strong>: transaction-level data for investigation</li></ul><div class="label" style="margin-top:10px">Annotation techniques</div><ul><li>Dynamic titles that reflect current slicer state</li><li>Text boxes with callouts explaining anomalies</li><li>Reference lines (target, average) on charts</li><li>Conditional formatting to direct attention</li></ul></div><div class="interview-tip">A great line: "I always ask: if I printed this report and handed it to a VP with no explanation, would they understand the story in 30 seconds? If not, the design needs work."</div>` },
    { accent: "orange", tag: "key",  tagLabel: "Key Topic",  title: "Troubleshooting and Debugging",
      body: `<div class="definition">The ability to diagnose and fix data, model, or visual problems systematically — a daily real-world skill.</div><div class="how-it-works"><div class="label">Common issues and how to investigate</div><ul><li><strong>Measure shows BLANK</strong> — check relationship direction and filter context; use ISBLANK() to debug</li><li><strong>Measure shows same value on every row</strong> — missing row context; need SUMX or calculated column</li><li><strong>Relationship not filtering</strong> — check cross-filter direction; may need to change to "Both"</li><li><strong>Scheduled refresh fails</strong> — check gateway status, data source credentials, row-level errors in Power Query</li><li><strong>Slow visual</strong> — use Performance Analyzer; look for DAX queries over 1 second</li></ul></div><div class="interview-tip">Structure your troubleshooting answer: "First I reproduce the issue, then isolate the layer (data, model, DAX, visual), then test a hypothesis, then fix and validate."</div>` },
    { accent: "green",  tag: "",     tagLabel: "",           title: "Handling Stakeholder Feedback",
      body: `<div class="definition">A soft skill that is heavily tested in BI roles — managing conflicting requirements, explaining technical constraints, and iterating on reports professionally.</div><div class="how-it-works"><div class="label">Common scenarios</div><ul><li>"The numbers do not match my Excel" — walk through the calculation logic and show where the discrepancy is at the row level</li><li>"Can you add 10 more filters?" — explain the performance impact and propose a drillthrough page instead</li><li>"I need this by tomorrow" — scope the MVP: what is essential vs. nice-to-have</li></ul></div><div class="interview-tip">Say: "I set up a weekly 30-minute check-in with stakeholders during development to surface issues early and avoid rebuilding after sign-off."</div>` }
  ]
},
{
  title: "Governance and Dataflows", icon: "Clipboard",
  intro: "Enterprise BI requires more than correct numbers — it requires trust, consistency, and control. Governance, data quality practices, and reusable dataflows are what separate ad-hoc reporting from scalable BI platforms.",
  cards: [
    { accent: "blue",   tag: "core", tagLabel: "Core",      title: "Data Governance in Power BI",
      body: `<div class="definition">Data governance is the framework of policies, processes, and standards that ensure data is accurate, secure, consistent, and used appropriately across the organization.</div><div class="how-it-works"><div class="label">Power BI governance mechanisms</div><ul><li><strong>Certified datasets</strong> — marked by data stewards as official, trusted sources; displayed with a blue badge. Only certified data should be used for official reporting</li><li><strong>Promoted datasets</strong> — discoverable shared datasets endorsed by the owner (one level below certified)</li><li><strong>Lineage View</strong> — shows the full data lineage: from source to dataflow to dataset to report to dashboard</li><li><strong>Usage Metrics</strong> — tracks who views a report and how often, helping you prioritize maintenance</li><li><strong>Admin Portal</strong> — tenant admins control feature enablement, export restrictions, and capacity settings</li></ul></div><div class="interview-tip">Say: "In our environment, only datasets certified by the data team can be used for executive-level reporting — it prevents conflicting numbers from different report authors."</div>` },
    { accent: "teal",   tag: "core", tagLabel: "Core",      title: "Data Profiling in Power Query",
      body: `<div class="definition">Data profiling is the process of examining a dataset to understand its structure, completeness, and quality before loading it into the model.</div><div class="how-it-works"><div class="label">Power Query profiling tools (View tab)</div><ul><li><strong>Column Quality</strong> — shows % Valid, Error, and Empty values per column. Any "Error" % immediately flags a data quality issue</li><li><strong>Column Distribution</strong> — histogram showing value frequency; reveals outliers and unexpected data</li><li><strong>Column Profile</strong> — detailed stats: min, max, average, distinct count, unique count</li></ul><div class="label" style="margin-top:10px">What to look for</div><ul><li>High null % in a join key column means many records will drop on merge</li><li>Very high cardinality in a text column causes compression problems — consider categorizing</li><li>Min/max outliers in numeric columns may indicate data entry errors</li></ul></div><div class="interview-tip">Always profile before building. "Before writing any DAX, I profile every source column to understand data quality, null rates, and cardinality — it prevents surprises in production."</div>` },
    { accent: "orange", tag: "key",  tagLabel: "Key Topic",  title: "Power BI Dataflows",
      body: `<div class="definition">Dataflows are reusable, cloud-based ETL pipelines built using Power Query Online inside the Power BI Service. They output tables that multiple datasets can connect to — creating a single source of truth for transformations.</div><div class="how-it-works"><div class="label">Why use dataflows over per-dataset Power Query?</div><ul><li><strong>Reusability</strong> — 10 datasets can all use the same "clean Customer" table from one dataflow</li><li><strong>Consistency</strong> — transformation logic is centralized; fix it once, all downstream datasets benefit</li><li><strong>Separation of concerns</strong> — data engineers manage dataflows; report authors consume them</li><li><strong>Enhanced compute (Premium)</strong> — dataflows can use Databricks or Synapse for transformation</li></ul><div class="label" style="margin-top:10px">Dataflow vs. Dataset</div><ul><li><strong>Dataflow</strong> — Power Query transformations in the cloud; outputs clean tables (no visuals, no measures)</li><li><strong>Dataset</strong> — contains the data model, relationships, and DAX; connects to a dataflow as its source</li></ul></div><div class="how-it-works"><div class="label">How to create a dataflow (step-by-step)</div><ul><li>1. In Power BI Service, navigate to your Workspace → click <strong>+ New → Dataflow</strong></li><li>2. Choose <em>Define new tables</em> to build from scratch (or <em>Import Model</em> to restore from a saved .json definition)</li><li>3. In the <strong>Power Query Online</strong> editor, click <em>Get data</em> and select your source (SQL Server, SharePoint, ADLS, Oracle via ODBC, etc.)</li><li>4. Enter the connection details and credentials — if the source is on-premises, select your enterprise gateway from the dropdown to route the connection</li><li>5. Apply your transformations exactly as in Power Query Desktop (rename columns, filter rows, merge, unpivot, Group By, etc.)</li><li>6. Click <em>Save &amp; close</em>, give the dataflow a name, then click <strong>Refresh now</strong> to perform the first data load into the dataflow's internal storage</li><li>7. Configure a <strong>scheduled refresh</strong> on the dataflow separately — the dataflow must refresh first, then datasets that consume it refresh afterwards</li><li>8. To consume in Desktop: <em>Get Data → Power BI Dataflows</em> → sign in → browse to your workspace → select the dataflow table</li></ul></div><div class="interview-tip">This is frequently asked in enterprise roles. "We use dataflows as our shared transformation layer — all datasets pull from certified dataflows rather than connecting directly to raw sources."</div>` },
    { accent: "green",  tag: "core", tagLabel: "Core",      title: "Scheduled Refresh — Setup and Troubleshooting",
      body: `<div class="definition">Scheduled refresh automatically updates a dataset's data in the Power BI Service at defined intervals, so reports always show current information without manual republishing.</div><div class="how-it-works"><div class="label">Setup steps</div><ul><li>1. Publish the report and dataset to the Service</li><li>2. In dataset settings → <em>Data source credentials</em>, authenticate each source</li><li>3. For on-premises sources: assign a gateway and map each Power Query source to a gateway connection</li><li>4. Configure refresh schedule: up to 8 times per day (Pro) or 48 times per day (Premium)</li><li>5. Set up email failure notifications so the team is alerted immediately</li></ul><div class="label" style="margin-top:10px">Gateway-related failures and how to resolve them (organization context)</div><ul><li><strong>Gateway shows offline in the Service</strong> — RDP to the gateway server; open <em>Services (services.msc)</em> and verify <em>On-premises data gateway service</em> is Running; restart if stopped. The gateway tile in Power BI Service shows a red/yellow status indicator when offline</li><li><strong>ODBC/JDBC driver missing on the gateway server</strong> — the most common silent failure: the driver exists on a developer's laptop but not on the server. Install the exact same driver version on the gateway server, create a matching System DSN in <em>ODBC Data Source Administrator (64-bit)</em> with the same name, and test the connection on the server before retrying the refresh</li><li><strong>Credentials expired after a password rotation</strong> — in dataset settings → <em>Data source credentials</em>, re-enter the updated credentials. For long-term stability, use service principal (Azure AD app) authentication to eliminate password expiry as a risk</li><li><strong>Firewall blocking the gateway</strong> — the gateway communicates <em>outbound</em> to Azure Service Bus on port 443 and 5671; no inbound ports are needed. Engage the network team to whitelist these outbound rules for the gateway server's IP</li><li><strong>Row-level errors not handled in Power Query</strong> — errors silently ignored in Desktop will cause cloud refresh to fail. Add <em>Remove Errors</em> or <em>Replace Errors</em> steps in Power Query for any unstable columns</li><li><strong>Timeout (2-hour hard limit per dataset)</strong> — use incremental refresh to shrink the data window processed on each run, or optimize query folding so fewer rows are transferred from the source</li></ul></div><div class="interview-tip">Best practice: "I configure failure alert emails and monitor refresh status across all datasets using the Power BI REST API or the built-in Admin Portal."</div>` }
  ]
},
{
  title: "On-Premises Gateway", icon: "Gateway",
  intro: "The On-Premises Data Gateway is the most critical infrastructure piece for connecting Power BI to internal databases. This tab covers the full lifecycle: installation, JDBC/ODBC driver setup, registering data sources in the Service, and troubleshooting the failures that are most common in enterprise environments.",
  cards: [
    { accent: "blue",   tag: "core", tagLabel: "Core",      title: "Gateway Architecture and Installation",
      body: `<div class="definition">The gateway is a Windows service installed on a machine inside the corporate network. It maintains a persistent <strong>outbound</strong> connection to Azure Service Bus — meaning no inbound firewall rules are needed — and relays data between on-premises sources and Power BI Service.</div><div class="how-it-works"><div class="label">How it works</div><ul><li>The gateway polls Azure Service Bus on ports <strong>443</strong> (HTTPS) and <strong>5671</strong> (AMQP) — outbound only; no inbound ports required</li><li>When a scheduled refresh fires in the Service, a message is queued in Service Bus; the gateway picks it up, executes the query against the internal data source, and returns results encrypted over TLS</li><li>The gateway service account must have read access to every data source it will connect to</li></ul><div class="label" style="margin-top:10px">Installation steps</div><ul><li>1. Download the gateway installer from Power BI Service: <em>Settings (gear icon) → Manage Connections and Gateways → Download gateway</em></li><li>2. Run the installer on a <strong>Windows Server or Windows 10/11 machine that is always-on</strong> and has network access to your data sources (SQL Server, Oracle, file shares, etc.)</li><li>3. Sign in with the Power BI account that will own/administer the gateway</li><li>4. Give the gateway a name and set a <strong>recovery key</strong> — save this securely, it is required to migrate or restore the gateway later</li><li>5. After installation, the gateway appears in Power BI Service under <em>Settings → Manage Connections and Gateways</em></li></ul><div class="label" style="margin-top:10px">High Availability clustering (Enterprise)</div><ul><li>Install the gateway on a second server and choose <em>Add to an existing gateway cluster</em> — if one node goes offline, the Service automatically routes refresh requests to another node</li><li>Recommended for any production environment with SLA requirements on refresh</li></ul></div><div class="interview-tip">Always install the gateway on a dedicated server, not on a developer's laptop or a shared machine that may be rebooted. High-availability clustering prevents a single gateway machine from being a single point of failure.</div>` },
    { accent: "orange", tag: "core", tagLabel: "Core",      title: "JDBC / ODBC Driver Setup",
      body: `<div class="definition">When connecting to data sources without a native Power BI connector (Oracle, Teradata, Hive, Impala, or other JDBC/ODBC-based sources), Power BI uses vendor-supplied drivers. The setup must be done on <strong>both your local machine</strong> (for Desktop development) and <strong>the gateway server machine</strong> (for cloud refresh).</div><div class="how-it-works"><div class="label">Local machine setup (Power BI Desktop)</div><ul><li>1. Download and install the vendor's 64-bit ODBC or JDBC driver (e.g., Oracle Client with ODBC driver, Simba ODBC/JDBC for Hive or Impala, Teradata ODBC driver)</li><li>2. Open <strong>ODBC Data Source Administrator (64-bit)</strong> — search in Windows Start; make sure you open the <em>64-bit</em> version, not 32-bit</li><li>3. Go to <em>System DSN tab → Add</em> → select your driver from the list → fill in the server hostname/IP, port, database or service name → click <em>Test Connection</em> to verify</li><li>4. In Power BI Desktop: <em>Get Data → ODBC</em> → select the DSN name from the dropdown → enter credentials → load data</li></ul><div class="label" style="margin-top:10px">Gateway server setup (for cloud refresh)</div><ul><li>1. Install the <strong>identical driver version</strong> on the gateway server — mismatched versions between local and server cause silent refresh failures</li><li>2. Create a System DSN on the server with the <strong>exact same name</strong> as on your local machine — when the Power BI Service sends a refresh request, the gateway looks up the DSN name locally on the server</li><li>3. Test the connection <strong>directly from the server</strong> using ODBC Data Source Administrator on that machine — do not assume it works just because it works on your laptop</li><li>4. For Oracle specifically: ensure the <em>ORACLE_HOME</em> environment variable is set correctly and the <em>tnsnames.ora</em> file or Easy Connect string is accessible to the gateway Windows service account</li><li>5. If the gateway service runs under a specific Windows service account (not LocalSystem), grant that account read access to the driver installation folder and any required config files</li></ul></div><div class="practice-box">The #1 practical mistake: installing the driver only on the developer's laptop and forgetting to install it on the gateway server. Always validate connectivity from the server itself before debugging anything in Power BI Service.</div>` },
    { accent: "teal",   tag: "core", tagLabel: "Core",      title: "Registering Data Sources in Power BI Service",
      body: `<div class="definition">Before any semantic model can use the gateway for refresh, each data source used in Power Query must be registered as a named connection on the gateway in Power BI Service, with credentials stored securely in the cloud.</div><div class="how-it-works"><div class="label">Step-by-step: registering a new connection</div><ul><li>1. In Power BI Service: <em>Settings (gear icon) → Manage Connections and Gateways</em></li><li>2. Find your enterprise gateway cluster → click <strong>+ New connection</strong></li><li>3. Select the connection type (SQL Server, ODBC, Oracle, SharePoint, etc.)</li><li>4. Enter the server name (or ODBC DSN name), database, authentication method, and credentials</li><li>5. Click <em>Test</em> — a successful test confirms the gateway can reach the source; then save the connection</li><li>6. Under <em>Users</em>, grant the dataset owners permission to use this connection</li></ul><div class="label" style="margin-top:10px">Mapping the connection to a published semantic model</div><ul><li>In the workspace, click the three dots on the semantic model → <em>Settings → Gateway and cloud connections</em></li><li>Each Power Query data source is listed; select the matching registered gateway connection from the dropdown for each</li><li>If any source is not mapped, the refresh will fail with a "data source not found" error even when the gateway is running correctly</li></ul><div class="label" style="margin-top:10px">Credentials management best practices</div><ul><li>Credentials are encrypted in the Power BI Service; the gateway decrypts them only at refresh time</li><li>When passwords rotate, re-enter credentials in the connection settings — this must be done manually each rotation</li><li>Long-term recommendation: use <strong>service principal (Azure AD app)</strong> authentication for SQL Server or Azure sources to eliminate password expiry as a failure cause</li></ul></div><div class="interview-tip">Always test the gateway connection (step 5) before diagnosing issues in dataset settings. If the test fails, the problem is at the network, firewall, or driver level — fixing it there first saves hours of cloud-side debugging.</div>` },
    { accent: "red",    tag: "key",  tagLabel: "Key Topic",  title: "Troubleshooting Gateway Failures",
