      body: `<div class="definition">Gateway issues are the number-one cause of scheduled refresh failures in enterprise environments. A systematic diagnostic approach isolates the problem layer quickly.</div><div class="how-it-works"><div class="label">Diagnostic checklist — start here</div><ul><li>1. In Power BI Service: <em>Settings → Manage Connections and Gateways</em> — check the cluster status indicator (green = online, red/yellow = problem)</li><li>2. RDP to the gateway server → open <em>Services (services.msc)</em> → find <strong>On-premises data gateway service</strong> → verify it is Running and set to Automatic startup</li><li>3. Open the <strong>On-premises data gateway configuration app</strong> on the server — it shows live connectivity status to Azure Service Bus and lists errors if the gateway cannot reach the cloud</li><li>4. Check the semantic model's <em>Refresh history</em> (three dots → Settings → Refresh history) — the error message pinpoints whether the failure is a gateway, credential, or data issue</li></ul></div><div class="how-it-works"><div class="label">Common failure causes and fixes</div><ul><li><strong>Gateway offline</strong> — restart the Windows service (services.msc); check that the server was not rebooted with the service set to Manual startup. Set to Automatic (Delayed Start)</li><li><strong>ODBC/JDBC driver missing or wrong version on server</strong> — install the same 64-bit driver version as on the developer machine; recreate the System DSN on the server; test from ODBC Administrator on the server before retrying</li><li><strong>Credentials expired after password rotation</strong> — in Manage Connections and Gateways → find the connection → edit credentials. Proactively switch to service principal auth for accounts that rotate frequently</li><li><strong>Firewall blocking outbound traffic</strong> — the gateway needs outbound access on port 443 and 5671 to Azure Service Bus endpoints. Engage the network/security team to add an allow rule for the gateway server's IP to these Azure endpoints</li><li><strong>Data source not mapped in semantic model settings</strong> — navigate to the semantic model → Settings → Gateway and cloud connections → ensure each source is mapped to its registered connection</li><li><strong>Row-level errors in source data</strong> — errors Power Query silently swallows in Desktop cause cloud refresh to fail. Add <em>Table.RemoveRowsWithErrors</em> or <em>Replace Errors</em> steps in Power Query for volatile source columns</li><li><strong>2-hour refresh timeout</strong> — implement incremental refresh to process only recent partitions; optimize query folding so the WHERE clause is pushed to the source system rather than pulling all rows</li></ul></div><div class="practice-box">Always reproduce the failure locally first: if the Power Query source works in Desktop (same query, same credentials), but fails in the Service, the gap is almost always on the gateway server — driver, DSN, credentials, or network.</div>` }
  ]
}
];

const tabsContainer     = document.getElementById("tabs");
const contentsContainer = document.getElementById("contents");

sections.forEach((sec, i) => {
  const tab = document.createElement("div");
  tab.className = "tab" + (i === 0 ? " active" : "");
  tab.textContent = sec.title;
  tab.onclick = () => activateTab(i);
  tabsContainer.appendChild(tab);

  const content = document.createElement("div");
  content.className = "content" + (i === 0 ? " active" : "");

  let cardsHTML = "";
  sec.cards.forEach(card => {
    const tagHTML = card.tagLabel
      ? '<span class="tag ' + card.tag + '">' + card.tagLabel + '</span>'
      : "";
    cardsHTML += '<div class="card accent-' + card.accent + '">'
      + '<div class="card-title">' + card.title + " " + tagHTML + "</div>"
      + card.body
      + "</div>";
  });

  content.innerHTML =
    '<div class="section-wrapper">'
    + '<div class="section-header">'
    + '<div class="section-header-text">'
    + "<h2>" + sec.title + "</h2>"
    + "<p>" + sec.intro + "</p>"
    + "</div></div>"
    + '<div class="cards-grid">' + cardsHTML + "</div>"
    + "</div>";

  contentsContainer.appendChild(content);
});

function activateTab(index) {
  document.querySelectorAll(".tab").forEach((t, i) => t.classList.toggle("active", i === index));
  document.querySelectorAll(".content").forEach((c, i) => c.classList.toggle("active", i === index));
  window.scrollTo({ top: 0, behavior: "smooth" });
}
</script>
</body>
</html>
